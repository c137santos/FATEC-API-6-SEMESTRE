name: CI Pipeline
on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: 1234

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@127.0.0.1:5432/test
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      MONGO_HOST: 127.0.0.1
      MONGO_ROOT_USER: root
      MONGO_ROOT_PASSWORD: 1234
      MONGO_DB: fatec_api
      MONGO_URI: mongodb://root:1234@127.0.0.1:27017/fatec_api?authSource=admin
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      MAIL_USERNAME: "test_user"
      MAIL_PASSWORD: "test_password"
      MAIL_FROM: "test@fatec.com"
      MAIL_SERVER: "smtp.test.com"
      MAIL_PORT: 587

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install dependencies
        working-directory: ./backend
        run: |
          export GDAL_CONFIG=/usr/bin/gdal-config
          export CPLUS_INCLUDE_PATH=/usr/include/gdal
          export C_INCLUDE_PATH=/usr/include/gdal
          uv sync --dev

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          PYTHONPATH: .
        run: uv run task test --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  check-required:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed! Blocking merge."
            exit 1
          else
            echo "All tests passed! Ready for merge."
          fi
