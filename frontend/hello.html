<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petite-Vue: Olá Mundo</title>

    <script src="https://unpkg.com/petite-vue" defer init></script>

    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input { margin-top: 10px; padding: 5px; }
    </style>
</head>
<body>

    <div v-scope="{ nome: 'Mundo', cor: 'blue' }" class="card">

        <h1 :style="{ color: cor }">Olá, {{ nome }}!</h1>

        <p>Digite seu nome abaixo:</p>
        <input v-model="nome" placeholder="Seu nome aqui...">

        <div style="margin-top: 15px;">
            <button @click="cor = 'red'">Ficar Vermelho</button>
            <button @click="cor = 'blue'">Ficar Azul</button>
        </div>

    </div>

</body>
</html>
